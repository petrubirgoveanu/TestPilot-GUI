name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Run unit tests
        run: pytest tests/unit -q --tb=no

      - name: Run lint (ruff)
        run: |
          python -m pip install ruff
          python -m ruff check . --select E,W,F,C90 --line-length 120 --no-cache

      - name: Run integration tests (if any)
        run: pytest tests/integration -q --tb=no || echo "No integration tests yet or skipped"

      - name: Run e2e tests (headless, serial)
        run: pytest tests/e2e -q --tb=no || echo "E2E may require storefront fixture - placeholder for now"

      - name: Build Docker image (smoke)
        run: docker build -t testpilot-slice .
