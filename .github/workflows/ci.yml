name: CI

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read

env:
  DEMO_MODE: "true"
  LANGSMITH_TRACING: "false"
  OPENROUTER_API_KEY: ""
  BASE_URL: "http://localhost:8080"

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          playwright install --with-deps chromium

      - name: Start controlled storefront
        run: |
          nohup python -m http.server 8080 --directory demo_site > storefront.log 2>&1 &
          echo $! > storefront.pid
          for i in {1..30}; do
            if curl -fsS "http://localhost:8080/index.html?mutation=baseline" > /dev/null; then
              echo "Storefront is ready"
              break
            fi
            sleep 1
          done
          curl -fsS "http://localhost:8080/index.html?mutation=testid_removed" > /dev/null

      - name: Run unit tests
        run: python -m pytest tests/unit -q --tb=no

      - name: Run lint (ruff)
        run: |
          python -m pip install ruff
          python -m ruff check . --select E,W,F,C90 --line-length 120 --no-cache

      - name: Run integration tests
        run: python -m pytest tests/integration -q --tb=no

      - name: Run e2e tests
        run: |
          set +e
          python -m pytest tests/e2e -q --tb=no
          rc=$?
          set -e
          if [ "$rc" -eq 5 ]; then
            echo "No e2e tests collected (exit 5). Treating as pass for now."
            exit 0
          fi
          exit "$rc"

      - name: Run eval suite
        run: python evals/run_evals.py

      - name: Build Docker image (smoke)
        run: docker build -t testpilot-slice .

      - name: Stop storefront
        if: always()
        run: |
          if [ -f storefront.pid ]; then
            kill "$(cat storefront.pid)" || true
          fi

      - name: Upload failure artifacts
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: testpilot-ci-artifacts-${{ github.run_id }}
          if-no-files-found: warn
          path: |
            artifacts/**
            storefront.log
            .pytest_cache/**
